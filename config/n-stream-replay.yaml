# ════════════════════════════════════════════════════════════════════════════
#  n-stream-replay — configuração de relay Kafka store-and-forward (modelo de ROTAS)
#
#  Modelo (v2): ORIGENS (sources) e DESTINOS (sinks) são conexões puras (sem tópico
#  fixo). As ROTAS amarram um tópico de origem a N alvos {sink, toTopic?}:
#    - toTopic presente: renomeia no destino;  toTopic ausente: preserva o nome de origem.
#  Os tópicos consumidos por uma origem são a união dos `fromTopic` de suas rotas.
#  Cada DESTINO tem sua própria fila durável (NQueue) em `queue.basePath/<id>/`; se um
#  destino fica offline, suas mensagens ficam na fila e são re-entregues quando ele volta.
# ════════════════════════════════════════════════════════════════════════════
nstreamreplay:

  # ── ORIGENS (consumers Kafka; kafka-clients cru, commit manual) ─────────────
  sources:
    - id: orders-src                       # único; referência em rotas e nome de métrica
      bootstrapServers: "localhost:9092"
      groupId: "n-stream-replay.orders"    # consumer group (enable.auto.commit=false)
      clientId: "nsr-orders-src"           # opcional (default = id)
      autoOffsetReset: latest              # earliest | latest | none
      maxPollRecords: 500
      pollTimeoutMs: 1000
      maxConsumeRatePerSec: 0              # teto de consumo em registros/s (0 = ilimitado)
      extraProps: {}                       # passthrough cru p/ o KafkaConsumer (SASL/TLS...)

  # ── DESTINOS (producers Kafka + fila durável; sem tópico fixo) ──────────────
  sinks:
    - id: dc2-mirror
      bootstrapServers: "localhost:9092"
      acks: all                            # 0 | 1 | all
      lingerMs: 50
      compressionType: lz4                 # none | gzip | snappy | lz4 | zstd
      maxRequestSize: 1048576              # bytes (>= 1 MiB)
      extraProps: {}                       # passthrough cru p/ o KafkaProducer
      queue:                               # store-and-forward POR DESTINO
        basePath: "var/n-stream-replay/queues"  # fila física em basePath/<sinkId>/
        maxDepth: 200000                   # bound por CONTAGEM (drop-oldest)
        retentionTime: 6h                  # bound por TEMPO (expireAfterWrite); 0s = off
        durability: sync-on-commit         # sync-on-commit | per-record-fsync | os-managed
        onWriteError: drop                 # drop | halt  (em falha de escrita local)
        batchSize: 256                     # lote drenado por iteração do forwarder
        forwarderRetryBackoffMs: 1000      # backoff quando o broker do destino está fora

  # ── ROTAS (tópico de origem -> N alvos {sink, toTopic?}) ────────────────────
  routes:
    - id: orders-mirror
      source: orders-src
      fromTopic: orders.in                 # tópico consumido na origem
      to:
        - { sink: dc2-mirror, toTopic: orders.mirror }   # renomeia no destino
        # - { sink: dc2-mirror }                          # (toTopic ausente = preserva "orders.in")
